name: Refresh Data

# Rebuilds public/data/*.json + *.geojson from the free government sources
# (ABS, CSA Victoria, Valuer-General, Geoscience Australia, Vicmap Planning)
# and commits the result to main — which triggers the Pages deploy.
# Manual for now (Actions tab -> Refresh Data -> Run workflow); re-add a
# monthly cron once a few runs have proven the sources reliable from runners.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dataset
        run: python -m engine.run

      - name: Commit & push refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "Refresh data (automated: ABS, CSA, VG, GA, Vicmap)"
            git pull --rebase origin main
            git push origin main
          fi
